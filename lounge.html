<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>popn_clear - 交流室</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell lounge-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="popn_clear home">
          <span class="brand-mark">pc</span>
          <span>
            <strong>popn_clear</strong>
            <small>community board</small>
          </span>
        </a>

        <nav class="level-nav" aria-label="level">
          <a class="level-pill nav-link-pill" href="./sheet.html?level=46">46</a>
          <a class="level-pill nav-link-pill" href="./sheet.html?level=47">47</a>
          <a class="level-pill nav-link-pill" href="./sheet.html?level=48">48</a>
          <a class="level-pill nav-link-pill" href="./sheet.html?level=49">49</a>
          <a class="level-pill nav-link-pill" href="./sheet.html?level=50">50</a>
          <a class="level-pill nav-link-pill active" href="./lounge.html">交流室</a>
        </nav>

        <div class="profile-menu">
          <button class="profile-chip" id="profile-menu-toggle" type="button" aria-expanded="false" aria-haspopup="true">
            <span class="profile-dot"></span>
            <span id="lounge-profile-name">guest</span>
          </button>
          <div class="profile-dropdown" id="profile-dropdown" hidden>
            <button type="button" data-auth-action="login">
              <span class="menu-icon">in</span>
              <span>
                <strong>登录</strong>
                <small>邮箱和密码</small>
              </span>
            </button>
            <button type="button" data-auth-action="register">
              <span class="menu-icon">+</span>
              <span>
                <strong>注册账号</strong>
                <small>创建玩家 ID</small>
              </span>
            </button>
            <button type="button" data-auth-action="logout">
              <span class="menu-icon">out</span>
              <span>
                <strong>退出登录</strong>
                <small>回到 guest</small>
              </span>
            </button>
          </div>
        </div>
      </header>

      <main class="lounge-grid">
        <section class="lounge-main">
          <div class="lounge-heading">
            <div>
              <p class="eyebrow">community room</p>
              <h1>交流室</h1>
            </div>
            <div class="lounge-actions">
              <button class="ghost-button hide-preview" id="community-hide" type="button">隐藏我的数据</button>
              <button class="ghost-button submit-preview" id="community-submit" type="button">提交当前数据</button>
            </div>
          </div>

          <div class="level-tabs" aria-label="community level filters">
            <button class="active" type="button" data-level="46">46</button>
            <button type="button" data-level="47">47</button>
            <button type="button" data-level="48">48</button>
            <button type="button" data-level="49">49</button>
            <button type="button" data-level="50">50</button>
          </div>

          <div class="rank-table-wrap">
            <table class="rank-table">
              <thead>
                <tr>
                  <th>玩家</th>
                  <th>Lv</th>
                  <th>总曲数</th>
                  <th>Clear</th>
                  <th>Medal</th>
                  <th>FC</th>
                  <th>Perfect</th>
                  <th>完成率</th>
                  <th>更新时间</th>
                </tr>
              </thead>
              <tbody id="rank-table-body">
                <tr>
                  <td colspan="9">Lv46 还没有玩家提交数据。</td>
                </tr>
              </tbody>
            </table>
          </div>

          <section class="activity-panel">
            <div class="activity-heading">
              <p class="eyebrow">activity log</p>
              <h2>消息数据</h2>
            </div>
            <div class="activity-box" id="activity-box" aria-label="community activity messages">
              <p>还没有消息数据。</p>
            </div>
          </section>
        </section>

        <aside class="lounge-side">
          <section class="submit-panel">
            <p class="eyebrow">notice</p>
            <h2>公告</h2>
            <p>TODO 和更新日志准备中。</p>
          </section>
        </aside>
      </main>
    </div>

    <div class="modal-backdrop" id="auth-modal" hidden>
      <section class="modal-panel auth-panel" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
        <button class="modal-close" type="button" data-modal-close="auth" aria-label="关闭">×</button>
        <p class="eyebrow">account</p>
        <h2 id="auth-modal-title">登录</h2>
        <p class="modal-copy" id="auth-modal-copy">登录后可以在交流室查看自己的账号状态。</p>
        <form id="auth-form">
          <label>
            <span>邮箱</span>
            <input id="auth-email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>密码</span>
            <input id="auth-password" type="password" autocomplete="current-password" minlength="8" required />
          </label>
          <label id="auth-display-field">
            <span>玩家 ID</span>
            <input id="auth-display-name" type="text" autocomplete="nickname" maxlength="24" />
          </label>
          <div class="modal-actions">
            <button class="ghost-button" type="button" data-modal-close="auth">取消</button>
            <button class="modal-primary" id="auth-submit" type="submit">登录</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop" id="message-modal" hidden>
      <section class="modal-panel message-panel" role="dialog" aria-modal="true" aria-labelledby="message-modal-title">
        <button class="modal-close" type="button" data-modal-close="message" aria-label="关闭">×</button>
        <h2 id="message-modal-title">提示</h2>
        <p class="modal-copy" id="message-modal-copy"></p>
        <div class="modal-actions">
          <button class="ghost-button" id="message-cancel" type="button">取消</button>
          <button class="modal-primary" id="message-ok" type="button">确定</button>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./lounge.js"></script>
  </body>
</html>
